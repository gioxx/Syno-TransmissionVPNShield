# =============================================================================
# Transmission VPN Shield - Runtime Configuration
# =============================================================================
# File location on NAS (after install):
#   /var/packages/transmission-vpn-shield/target/conf/guard.conf
#
# After editing this file, restart the package from DSM Package Center
# (or via SSH: sudo synopkg restart transmission-vpn-shield)
# =============================================================================


# -----------------------------------------------------------------------------
# Transmission system user
# -----------------------------------------------------------------------------
# The user account that runs Transmission on your NAS.
# On most Synology systems this is "sc-transmission" (DSM native package).
# The shield auto-detects it if left as-is, but you can override it here.
# Other common values: "transmission", "debian-transmission"
TRANSMISSION_USER="sc-transmission"


# -----------------------------------------------------------------------------
# VPN interface
# -----------------------------------------------------------------------------
# The network interface created by your VPN client.
# OpenVPN (most common): tun0
# WireGuard: wg0
# Check the current interfaces on your NAS with: ip link show
VPN_IF="tun0"


# -----------------------------------------------------------------------------
# Routing table
# -----------------------------------------------------------------------------
# Internal Linux routing table used to isolate Transmission traffic.
# You only need to change these if they conflict with another package
# that already uses table ID 200. Leave them as-is in most cases.
RT_TABLE_ID="200"
RT_TABLE_NAME="transmissionvpn"


# -----------------------------------------------------------------------------
# Kill switch
# -----------------------------------------------------------------------------
# When set to "1": if the VPN is down, Transmission traffic is BLOCKED
# rather than leaking through your regular internet connection.
# When set to "0": Transmission can fall back to the normal connection
# if the VPN drops (NOT recommended — your real IP may be exposed).
#
# Note: the kill switch requires the iptables "owner" module (xt_owner).
# If your NAS kernel doesn't support it, the shield logs a warning and
# falls back to routing-only protection (still safe — no VPN route = no traffic).
ENFORCE_KILLSWITCH_WHEN_VPN_DOWN="1"


# -----------------------------------------------------------------------------
# Public IP refresh interval
# -----------------------------------------------------------------------------
# How often (in seconds) the shield re-checks your public IP address
# through the VPN tunnel and caches it for display in the web UI.
# Default: 7200 (every 2 hours). Set to 0 to disable background refresh.
PUBLIC_IP_REFRESH_SEC="7200"


# -----------------------------------------------------------------------------
# VPN forwarded port  ←  IMPORTANT for good download/upload speeds
# -----------------------------------------------------------------------------
# Some VPN providers let you "forward" a port through the VPN so that
# other BitTorrent peers can connect TO you directly (not just you to them).
# This significantly improves speeds and seeding ratios.
#
# How to set this up (example: AirVPN):
#   1. Log in to your VPN provider's website.
#   2. Find the "Port forwarding" or "Forwarded ports" section.
#   3. Create/note the forwarded port number (e.g. 56460).
#   4. Set FORWARDED_PORT to that number below.
#   5. Save this file and restart the package.
#
# The shield will automatically tell Transmission to listen on this port
# every time the service starts — no manual configuration needed.
#
# IMPORTANT: you do NOT need to open this port on your router or DSM
# firewall. Traffic enters through the VPN tunnel, bypassing your router.
#
# Leave empty ("") if your VPN provider does not support port forwarding
# or if you have not configured one yet.
FORWARDED_PORT=""
