# Transmission VPN Guard configuration

# Username running transmission-daemon (SPK)
# Auto-detection tries: sc-transmission, transmission, debian-transmission
TRANSMISSION_USER="sc-transmission"

# VPN interface name (OpenVPN usually tun0)
VPN_IF="tun0"

# Routing table id and name
RT_TABLE_ID="200"
RT_TABLE_NAME="transmissionvpn"

# If true, block Transmission traffic when VPN IF is not up
ENFORCE_KILLSWITCH_WHEN_VPN_DOWN="1"

# Interval (seconds) between background public-IP refreshes via the VPN tunnel.
# Set to 0 to disable.
PUBLIC_IP_REFRESH_SEC="7200"

# Optional: VPN forwarded port.
# If your VPN provider assigns you a forwarded port, set it here.
# It will be pushed to Transmission via RPC on every service start.
# Leave empty ("") to skip.
FORWARDED_PORT=""
