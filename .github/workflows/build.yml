name: Build n Release Synology Smart Info Package

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-spk:
    name: Build Package (kvmx64, 7.2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Package
        uses: tomgrv/synology-package-builder@v2.2.5
        with:
          dsm: "7.2"
          arch: "kvmx64"
          output: "./dist"

      - name: Patch arch to noarch in SPK
        run: |
          for spk in ./dist/*.spk; do
            tmpdir=$(mktemp -d)
            tar -xf "$spk" -C "$tmpdir"
            sed -i 's/^arch="[^"]*"/arch="noarch"/' "$tmpdir/INFO"
            newname=$(echo "$spk" | sed 's/x86_64/noarch/')
            (cd "$tmpdir" && tar -cf - *) > "$newname"
            [ "$spk" != "$newname" ] && rm "$spk"
            rm -rf "$tmpdir"
          done

      - name: Upload Package
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ./dist/*.spk
